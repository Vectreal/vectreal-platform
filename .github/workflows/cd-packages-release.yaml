name: CD - Release Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: packages-release
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release PR / GitHub Release
    runs-on: ubuntu-22.04
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      core_release_created: ${{ steps.release.outputs['packages/core--release_created'] }}
      hooks_release_created: ${{ steps.release.outputs['packages/hooks--release_created'] }}
      viewer_release_created: ${{ steps.release.outputs['packages/viewer--release_created'] }}
      root_release_created: ${{ steps.release.outputs['.--release_created'] }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish Released Packages to NPM
    needs: release-please
    if: ${{ needs.release-please.outputs.core_release_created == 'true' || needs.release-please.outputs.hooks_release_created == 'true' || needs.release-please.outputs.viewer_release_created == 'true' }}
    environment: packages-releasing
    runs-on: ubuntu-22.04
    permissions:
      id-token: write # Required for OIDC authentication with NPM
      contents: read
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Git
        run: |
          git config --global user.email "<>"
          git config --global user.name "github-actions[bot]"

      - name: Print Environment Info
        run: npx nx report
        shell: bash

      - name: Preflight pack @vctrl/core
        if: ${{ needs.release-please.outputs.core_release_created == 'true' }}
        run: |
          npx nx run vctrl/core:copy-md
          cd build/packages/vctrl/core
          npm pack --dry-run
        shell: bash

      - name: Publish @vctrl/core
        if: ${{ needs.release-please.outputs.core_release_created == 'true' }}
        run: npx nx run vctrl/core:publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight pack @vctrl/hooks
        if: ${{ needs.release-please.outputs.hooks_release_created == 'true' }}
        run: |
          npx nx run vctrl/hooks:copy-md
          cd build/packages/vctrl/hooks
          npm pack --dry-run
        shell: bash

      - name: Publish @vctrl/hooks
        if: ${{ needs.release-please.outputs.hooks_release_created == 'true' }}
        run: npx nx run vctrl/hooks:publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight pack @vctrl/viewer
        if: ${{ needs.release-please.outputs.viewer_release_created == 'true' }}
        run: |
          npx nx run vctrl/viewer:copy-md
          cd build/packages/vctrl/viewer
          npm pack --dry-run
        shell: bash

      - name: Publish @vctrl/viewer
        if: ${{ needs.release-please.outputs.viewer_release_created == 'true' }}
        run: npx nx run vctrl/viewer:publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
