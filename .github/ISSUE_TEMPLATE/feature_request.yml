name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Vectreal better? We would love to hear it.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Platform app (vectreal.com)
        - "@vctrl/viewer package"
        - "@vctrl/hooks package"
        - "@vctrl/core package"
        - Documentation
        - CI / Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What is the current limitation?
      placeholder: "Currently there is no way to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have tried.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
