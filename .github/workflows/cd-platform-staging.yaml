# .github/workflows/cd-platform-staging.yaml
name: CD - Deploy Platform to Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/vectreal-platform/**'
      - 'packages/core/**'
      - 'packages/embed/**'
      - 'packages/hooks/**'
      - 'packages/viewer/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'eslint.config.mts'
      - 'jest.config.ts'
      - 'tsconfig.base.json'
      - '.github/workflows/ci-quality.yaml'
      - '.github/workflows/cd-platform-staging.yaml'
      - '.github/workflows/cd-platform-production.yaml'
      - '.github/workflows/shared-fly-deploy.yaml'

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-platform-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    uses: ./.github/workflows/shared-fly-deploy.yaml
    with:
      app_name: vectreal-platform-staging
      fly_config: apps/vectreal-platform/fly.staging.toml
      environment: staging
      fail_on_health_check: false
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      VITE_PUBLIC_POSTHOG_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_TOKEN }}
      VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
      VITE_PUBLIC_POSTHOG_UI_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_UI_HOST }}
      VITE_PUBLIC_VECTREAL_API_KEY_PROD: ${{ secrets.VITE_PUBLIC_VECTREAL_API_KEY_PROD }}
      VITE_PUBLIC_DEMO_SCENE_URL: ${{ secrets.VITE_PUBLIC_DEMO_SCENE_URL }}