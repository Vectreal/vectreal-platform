name: Shared - Google Cloud Run Deployment

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (staging or production)'
        required: true
        type: string
      service-name:
        description: 'Cloud Run service name'
        required: true
        type: string
      image-name:
        description: 'Docker image name'
        required: true
        type: string
      region:
        description: 'Google Cloud region'
        required: false
        type: string
        default: 'us-central1'
      artifact-region:
        description: 'Google Artifact Registry region for image push/pull'
        required: false
        type: string
        default: 'us-central1'
      node-env:
        description: 'NODE_ENV value'
        required: false
        type: string
        default: 'production'
      static-bucket-name:
        description: 'Optional public static bucket name for CDN asset upload'
        required: false
        type: string
        default: ''
      static-cache-control:
        description: 'Cache-Control header to apply to uploaded static assets'
        required: false
        type: string
        default: 'public, max-age=31536000, immutable'
      promote-static-from-bucket:
        description: 'Optional source bucket used to copy static assets into static-bucket-name when not rebuilding'
        required: false
        type: string
        default: ''
      build-and-push-image:
        description: 'Whether this job should build and push the Docker image'
        required: false
        type: boolean
        default: true
      allow-unauthenticated:
        description: 'Whether Cloud Run service should allow unauthenticated direct invocations'
        required: false
        type: boolean
        default: true
      cloud-run-flags:
        description: 'Additional flags passed to gcloud run deploy (for example --ingress internal-and-cloud-load-balancing)'
        required: false
        type: string
        default: ''
      image-uri:
        description: 'Optional full image URI to deploy (overrides computed image URI)'
        required: false
        type: string
        default: ''
      fail-on-health-check:
        description: 'Whether to fail the workflow when post-deploy health check fails'
        required: false
        type: boolean
        default: false
    secrets:
      gcp-workload-identity-provider:
        description: 'Workload Identity Provider resource name (projects/NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER)'
        required: true
      gcp-service-account:
        description: 'Service account email to impersonate via Workload Identity Federation'
        required: true
      gcp-project-id:
        description: 'Google Cloud project ID. When omitted or invalid the project ID is derived from the gcp-service-account email.'
        required: false
      database-url:
        description: 'Database URL for migrations and runtime'
        required: true
      supabase-url:
        description: 'Supabase URL'
        required: true
      supabase-key:
        description: 'Supabase Key'
        required: true
      google-cloud-storage-private-bucket:
        description: 'Google Cloud Storage private bucket name'
        required: true
      application-url:
        description: 'Application URL'
        required: true
      csrf-secret:
        description: 'CSRF/session secret used for server-side cookie signing in production-like environments'
        required: true
      stripe-secret-key:
        description: 'Stripe secret API key used for billing operations'
        required: true
      cloudflare-turnstile-site-key:
        description: 'Cloudflare Turnstile site key exposed to the SSR app at runtime'
        required: false
      cloudflare-turnstile-secret-key:
        description: 'Cloudflare Turnstile secret key used for server-side verification'
        required: false
      posthog-token:
        description: 'PostHog project API key (VITE_PUBLIC_POSTHOG_TOKEN)'
        required: false
      posthog-host:
        description: 'PostHog ingestion endpoint (VITE_PUBLIC_POSTHOG_HOST)'
        required: false
      posthog-ui-host:
        description: 'PostHog UI host (VITE_PUBLIC_POSTHOG_UI_HOST)'
        required: false
      contact-data-encryption-key:
        description: 'PII encryption key for contact form submissions'
        required: false
      resend-api-key:
        description: 'Resend API key for outbound contact emails'
        required: false
      resend-webhook-secret:
        description: 'Resend webhook signature secret'
        required: false
      contact-inbox-email:
        description: 'Inbox address for contact submissions'
        required: false
      from-email:
        description: 'Verified sender address for all outbound emails (auth + contact)'
        required: false
      send-email-hook-secret:
        description: 'HMAC secret for verifying Supabase send_email hook requests'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.gcp-workload-identity-provider }}
          service_account: ${{ secrets.gcp-service-account }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve GCP project id
        id: project
        run: |
          PROJECT_ID="${{ secrets.gcp-project-id }}"

          # Validate format: 6-30 chars, lowercase letters/digits/hyphens, start with letter, end with letter/digit.
          if printf '%s' "$PROJECT_ID" | grep -Eq '^[a-z][a-z0-9-]{4,28}[a-z0-9]$'; then
            echo "id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback: extract from the service account email (name@PROJECT_ID.iam.gserviceaccount.com).
          SA_EMAIL="${{ secrets.gcp-service-account }}"
          DERIVED_ID="$(printf '%s' "$SA_EMAIL" | sed -n 's/^[^@]*@\([^.]*\)\.iam\.gserviceaccount\.com$/\1/p')"

          if printf '%s' "$DERIVED_ID" | grep -Eq '^[a-z][a-z0-9-]{4,28}[a-z0-9]$'; then
            echo "::warning::gcp-project-id secret has an invalid or missing value (length: ${#PROJECT_ID}). Derived project ID from the service account email instead. Fix by running: ./terraform/scripts/setup-github-secrets.sh"
            echo "id=$DERIVED_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Could not resolve a valid GCP project ID from the gcp-project-id secret (length: ${#PROJECT_ID}) or the service account email."
          echo "::error::Fix: ensure GCP_PROJECT_ID / GCP_PROJECT_ID_STAGING is set correctly and run ./terraform/scripts/setup-github-secrets.sh"
          exit 1

      - name: Promote static assets between buckets
        if: ${{ inputs.static-bucket-name != '' && !inputs.build-and-push-image && inputs.promote-static-from-bucket != '' }}
        run: |
          gsutil -m rsync -r -d gs://${{ inputs.promote-static-from-bucket }} gs://${{ inputs.static-bucket-name }}
          gsutil -m setmeta -h "Cache-Control:${{ inputs.static-cache-control }}" "gs://${{ inputs.static-bucket-name }}/**"

      - name: Log in to Google Artifact Registry
        if: ${{ inputs.build-and-push-image }}
        run: |
          gcloud auth configure-docker ${{ inputs.artifact-region }}-docker.pkg.dev

      - name: Compute image tags
        if: ${{ inputs.build-and-push-image }}
        id: image-tags
        run: |
          PRIMARY_TAG="${{ inputs.artifact-region }}-docker.pkg.dev/${{ steps.project.outputs.id }}/vectreal-platform/${{ inputs.image-name }}:${{ github.sha }}"
          LATEST_TAG=""

          if [ "${{ inputs.environment }}" = "production" ]; then
            LATEST_TAG="${{ inputs.artifact-region }}-docker.pkg.dev/${{ steps.project.outputs.id }}/vectreal-platform/${{ inputs.image-name }}:latest"
          fi

          if ! printf '%s' "$PRIMARY_TAG" | grep -Eq '^[a-z0-9.-]+/[a-z0-9._/-]+:[A-Za-z0-9._-]+$'; then
            echo "::error::Computed PRIMARY_TAG is not a valid Docker image reference."
            echo "::notice::Tag candidate: $PRIMARY_TAG"
            exit 1
          fi

          echo "primary=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image once
        if: ${{ inputs.build-and-push-image }}
        run: |
          PRIMARY_TAG="${{ steps.image-tags.outputs.primary }}"
          LATEST_TAG="${{ steps.image-tags.outputs.latest }}"

          TAG_ARGS=(--tag "$PRIMARY_TAG")
          if [ -n "$LATEST_TAG" ]; then
            TAG_ARGS+=(--tag "$LATEST_TAG")
          fi

          docker buildx build \
            --file ./apps/vectreal-platform/Dockerfile \
            --target runner \
            --build-arg NODE_ENV=${{ inputs.node-env }} \
            --build-arg BUILD_CSRF_SECRET=${{ secrets.csrf-secret }} \
            --build-arg BUILD_DATABASE_URL=${{ secrets.database-url }} \
            --build-arg BUILD_SUPABASE_URL=${{ secrets.supabase-url }} \
            --build-arg BUILD_SUPABASE_KEY=${{ secrets.supabase-key }} \
            --build-arg BUILD_STRIPE_SECRET_KEY=${{ secrets.stripe-secret-key }} \
            --build-arg BUILD_VITE_PUBLIC_POSTHOG_TOKEN=${{ secrets.posthog-token }} \
            --build-arg BUILD_VITE_PUBLIC_POSTHOG_HOST=${{ secrets.posthog-host }} \
            --build-arg BUILD_VITE_PUBLIC_POSTHOG_UI_HOST=${{ secrets.posthog-ui-host || 'https://eu.posthog.com' }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            "${TAG_ARGS[@]}" \
            --load \
            .

      - name: Extract static client assets from built image
        if: ${{ inputs.static-bucket-name != '' && inputs.build-and-push-image }}
        run: |
          IMAGE_TAG="${{ steps.image-tags.outputs.primary }}"
          CONTAINER_ID=$(docker create "$IMAGE_TAG")
          mkdir -p build/apps/vectreal-platform/client
          docker cp "$CONTAINER_ID":/app/build/apps/vectreal-platform/client/. build/apps/vectreal-platform/client
          docker rm "$CONTAINER_ID"

      - name: Upload static client assets to GCS
        if: ${{ inputs.static-bucket-name != '' && inputs.build-and-push-image }}
        run: |
          gsutil -m rsync -r -d build/apps/vectreal-platform/client gs://${{ inputs.static-bucket-name }}
          gsutil -m setmeta -h "Cache-Control:${{ inputs.static-cache-control }}" "gs://${{ inputs.static-bucket-name }}/**"

      - name: Push Docker image tags
        if: ${{ inputs.build-and-push-image }}
        run: |
          docker push "${{ steps.image-tags.outputs.primary }}"

          if [ -n "${{ steps.image-tags.outputs.latest }}" ]; then
            docker push "${{ steps.image-tags.outputs.latest }}"
          fi

      - name: Resolve image URI
        id: image
        run: |
          if [ -n "${{ inputs.image-uri }}" ]; then
            echo "uri=${{ inputs.image-uri }}" >> "$GITHUB_OUTPUT"
          else
            echo "uri=${{ inputs.artifact-region }}-docker.pkg.dev/${{ steps.project.outputs.id }}/vectreal-platform/${{ inputs.image-name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ inputs.service-name }}
          image: ${{ steps.image.outputs.uri }}
          region: ${{ inputs.region }}
          flags: ${{ format('{0} {1}', inputs.allow-unauthenticated && '--allow-unauthenticated' || '', inputs.cloud-run-flags) }}
          env_vars: |
            NODE_ENV=${{ inputs.node-env }}
            ENVIRONMENT=${{ inputs.environment }}
            GOOGLE_CLOUD_PROJECT=${{ steps.project.outputs.id }}
            DATABASE_URL=${{ secrets.database-url }}
            SUPABASE_URL=${{ secrets.supabase-url }}
            SUPABASE_KEY=${{ secrets.supabase-key }}
            GOOGLE_CLOUD_STORAGE_PRIVATE_BUCKET=${{ secrets.google-cloud-storage-private-bucket }}
            APPLICATION_URL=${{ secrets.application-url }}
            CSRF_SECRET=${{ secrets.csrf-secret }}
            STRIPE_SECRET_KEY=${{ secrets.stripe-secret-key }}
            CLOUDFLARE_TURNSTILE_SITE_KEY=${{ secrets.cloudflare-turnstile-site-key }}
            CLOUDFLARE_TURNSTILE_SECRET_KEY=${{ secrets.cloudflare-turnstile-secret-key }}
            VITE_PUBLIC_POSTHOG_TOKEN=${{ secrets.posthog-token }}
            VITE_PUBLIC_POSTHOG_HOST=${{ secrets.posthog-host }}
            VITE_PUBLIC_POSTHOG_UI_HOST=${{ secrets.posthog-ui-host || 'https://eu.posthog.com' }}
            CONTACT_DATA_ENCRYPTION_KEY=${{ secrets.contact-data-encryption-key }}
            RESEND_API_KEY=${{ secrets.resend-api-key }}
            RESEND_WEBHOOK_SECRET=${{ secrets.resend-webhook-secret }}
            CONTACT_INBOX_EMAIL=${{ secrets.contact-inbox-email }}
            FROM_EMAIL=${{ secrets.from-email }}
            SEND_EMAIL_HOOK_SECRET=${{ secrets.send-email-hook-secret }}

      - name: Verify deployment health
        run: |
          echo "Waiting for service to become healthy..."
          sleep 20

          HEALTH_CHECK_URL="${{ secrets.application-url }}/health"

          if bash .github/scripts/health-check.sh "$HEALTH_CHECK_URL" 8 15; then
            exit 0
          fi

          if [ "${{ inputs.fail-on-health-check }}" = "true" ]; then
            echo "::error::Deployment health check failed. Failing workflow as configured."
            exit 1
          fi

          echo "::warning::Deployment completed but health check failed. Please verify manually."
          exit 0

      - name: Output deployment info
        run: |
          echo "::notice::✅ Deployed to ${{ inputs.environment }} environment"
          echo "::notice::Service: ${{ inputs.service-name }}"
          echo "::notice::Region: ${{ inputs.region }}"
          echo "::notice::Image: ${{ steps.image.outputs.uri }}"
