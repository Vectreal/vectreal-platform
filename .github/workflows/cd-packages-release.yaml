name: CD - Release Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: packages-release
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release PR / GitHub Release
    runs-on: ubuntu-22.04
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      root_release_created: ${{ steps.release.outputs.release_created }}
      core_version: ${{ steps.release.outputs['packages/core--version'] }}
      hooks_version: ${{ steps.release.outputs['packages/hooks--version'] }}
      viewer_version: ${{ steps.release.outputs['packages/viewer--version'] }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6

      - name: Build package-grouped root release notes
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          ROOT_VERSION: ${{ steps.release.outputs.version }}
          CORE_VERSION: ${{ steps.release.outputs['packages/core--version'] }}
          HOOKS_VERSION: ${{ steps.release.outputs['packages/hooks--version'] }}
          VIEWER_VERSION: ${{ steps.release.outputs['packages/viewer--version'] }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          extract_section() {
            local file="$1"
            local version="$2"

            if [[ -z "$version" || ! -f "$file" ]]; then
              echo "No changes recorded for this package in this release."
              return
            fi

            local section
            section=$(awk -v version="$version" '
              $0 ~ "^## \\[" version "\\]" {capture=1; next}
              capture && $0 ~ /^## \[/ {exit}
              capture {print}
            ' "$file")

            if [[ -z "${section//[[:space:]]/}" ]]; then
              echo "No changes recorded for this package in this release."
            else
              printf "%s\n" "$section"
            fi
          }

          {
            echo "## Release v${ROOT_VERSION}"
            echo
            echo "### @vctrl/core (${CORE_VERSION:-unchanged})"
            extract_section "packages/core/CHANGELOG.md" "$CORE_VERSION"
            echo
            echo "### @vctrl/hooks (${HOOKS_VERSION:-unchanged})"
            extract_section "packages/hooks/CHANGELOG.md" "$HOOKS_VERSION"
            echo
            echo "### @vctrl/viewer (${VIEWER_VERSION:-unchanged})"
            extract_section "packages/viewer/CHANGELOG.md" "$VIEWER_VERSION"
          } > release-notes.md

          gh release edit "$TAG_NAME" --notes-file release-notes.md

  publish:
    name: Publish Released Packages to NPM
    needs: release-please
    if: ${{ needs.release-please.outputs.root_release_created == 'true' }}
    environment: packages-releasing
    runs-on: ubuntu-22.04
    permissions:
      id-token: write # Required for OIDC authentication with NPM
      contents: read
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enforce trusted publishing auth mode
        shell: bash
        run: |
          set -euo pipefail

          # Ensure token-based npm auth is not inherited by downstream steps.
          {
            echo "NODE_AUTH_TOKEN="
            echo "NPM_TOKEN="
          } >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Git
        run: |
          git config --global user.email "<>"
          git config --global user.name "github-actions[bot]"

      - name: Print Environment Info
        run: npx nx report
        shell: bash

      - name: Diagnostics - npm trusted publishing context
        shell: bash
        run: |
          set -euo pipefail

          echo "GitHub context"
          echo "  repository: ${GITHUB_REPOSITORY}"
          echo "  ref: ${GITHUB_REF}"
          echo "  workflow: ${GITHUB_WORKFLOW}"
          echo "  actor: ${GITHUB_ACTOR}"

          echo "Node/npm context"
          node --version
          npm --version
          echo "  npm registry: $(npm config get registry)"
          if [[ "${NODE_AUTH_TOKEN:-}" == "XXXXX-XXXXX-XXXXX-XXXXX" ]]; then
            echo "  NODE_AUTH_TOKEN is setup-node placeholder (no real token configured)"
          elif [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "  NODE_AUTH_TOKEN is set (real value present)"
          else
            echo "  NODE_AUTH_TOKEN is not set"
          fi

          if [[ -f "$HOME/.npmrc" ]]; then
            echo "Sanitized ~/.npmrc"
            sed -E 's#(//registry\.npmjs\.org/:_authToken=).*#\1***REDACTED***#' "$HOME/.npmrc"
          else
            echo "No ~/.npmrc present"
          fi

          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" && -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "Requesting OIDC token for npm audience..."
            oidc_response=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
            oidc_token=$(node -e 'let d=""; process.stdin.on("data", c => d += c); process.stdin.on("end", () => { try { const j = JSON.parse(d); process.stdout.write(j.value || ""); } catch {} });' <<< "$oidc_response")

            if [[ -z "$oidc_token" ]]; then
              echo "Failed to mint OIDC token for npm audience"
              echo "$oidc_response"
              exit 1
            fi

            oidc_payload=$(node -e 'const t = process.argv[1]; const p = (t.split(".")[1] || ""); const b = p.replace(/-/g, "+").replace(/_/g, "/"); const pad = "=".repeat((4 - (b.length % 4)) % 4); process.stdout.write(Buffer.from(b + pad, "base64").toString("utf8"));' "$oidc_token")
            echo "OIDC payload (selected claims)"
            node -e 'const c = JSON.parse(process.argv[1]); const out = {iss: c.iss, aud: c.aud, sub: c.sub, repository: c.repository, repository_owner: c.repository_owner, ref: c.ref, job_workflow_ref: c.job_workflow_ref, environment: c.environment}; console.log(JSON.stringify(out, null, 2));' "$oidc_payload"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN not present; id-token: write permission may be missing"
            exit 1
          fi

          echo "Package visibility check (informational)"
          npm view @vctrl/core name --json || true
          npm view @vctrl/hooks name --json || true
          npm view @vctrl/viewer name --json || true

      - name: Preflight pack @vctrl/core
        run: |
          npx nx run vctrl/core:copy-md
          cd build/packages/vctrl/core
          npm pack --dry-run
        shell: bash

      - name: Publish @vctrl/core
        run: npx nx run vctrl/core:publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Preflight pack @vctrl/hooks
        run: |
          npx nx run vctrl/hooks:copy-md
          cd build/packages/vctrl/hooks
          npm pack --dry-run
        shell: bash

      - name: Publish @vctrl/hooks
        run: npx nx run vctrl/hooks:publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Preflight pack @vctrl/viewer
        run: |
          npx nx run vctrl/viewer:copy-md
          cd build/packages/vctrl/viewer
          npm pack --dry-run
        shell: bash

      - name: Publish @vctrl/viewer
        run: npx nx run vctrl/viewer:publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
