# apps/trellis-runtime/fly.toml
app            = "vectreal-trellis-runtime"
primary_region = "fra"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 10
    soft_limit = 8

[[vm]]
  size = "performance-1x"

[checks]
  [checks.health]
    grace_period = "30s"
    interval     = "15s"
    method       = "get"
    path         = "/health"
    port         = 8080
    timeout      = "10s"
    type         = "http"

