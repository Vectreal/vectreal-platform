# .github/workflows/cd-trellis-runtime-production.yaml
name: CD - Deploy Trellis Runtime to Production

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:

concurrency:
  group: cd-trellis-runtime-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: CI Quality Gate
    uses: ./.github/workflows/ci-quality.yaml

  deploy-production:
    name: Deploy Trellis Runtime to Production
    needs: quality-gate
    if: ${{ needs.quality-gate.result == 'success' }}
    uses: ./.github/workflows/shared-fly-deploy.yaml
    with:
      app_name: vectreal-trellis-runtime
      image_name: vectreal-trellis-runtime
      fly_config: apps/trellis-runtime/fly.toml
      dockerfile: apps/trellis-runtime/Dockerfile
      environment: production
      fail_on_health_check: true
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      VITE_PUBLIC_POSTHOG_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_TOKEN }}
      VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}

