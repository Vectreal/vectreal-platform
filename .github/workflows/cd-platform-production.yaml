# .github/workflows/cd-platform-production.yaml
name: CD - Deploy Platform to Production

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:

concurrency:
  group: cd-platform-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: CI Quality Gate
    uses: ./.github/workflows/ci-quality.yaml

  deploy-production:
    name: Deploy to Production Environment
    needs: quality-gate
    if: ${{ needs.quality-gate.result == 'success' }}
    uses: ./.github/workflows/shared-fly-deploy.yaml
    with:
      app_name: vectreal-platform
      fly_config: apps/vectreal-platform/fly.toml
      static_bucket: vectreal-static-prod
      asset_base_url: https://static.vectreal.com
      environment: production
      fail_on_health_check: true
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      VITE_PUBLIC_POSTHOG_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_TOKEN }}
      VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
      VITE_PUBLIC_POSTHOG_UI_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_UI_HOST }}
      VITE_PUBLIC_VECTREAL_API_KEY_PROD: ${{ secrets.VITE_PUBLIC_VECTREAL_API_KEY_PROD }}
      VITE_PUBLIC_DEMO_SCENE_URL: ${{ secrets.VITE_PUBLIC_DEMO_SCENE_URL }}