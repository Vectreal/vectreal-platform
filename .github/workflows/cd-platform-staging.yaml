name: CD - Deploy Platform to Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/vectreal-platform/**'
      - 'packages/core/**'
      - 'packages/embed/**'
      - 'packages/hooks/**'
      - 'packages/viewer/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'eslint.config.mts'
      - 'jest.config.ts'
      - 'tsconfig.base.json'
      - '.github/workflows/ci-quality.yaml'
      - '.github/workflows/cd-platform-staging.yaml'
      - '.github/workflows/cd-platform-production.yaml'
      - '.github/workflows/shared-gcloud-deploy.yaml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-platform-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    uses: ./.github/workflows/shared-gcloud-deploy.yaml
    with:
      environment: staging
      service-name: vectreal-platform-staging
      image-name: vectreal-platform-staging
      region: europe-west3
      artifact-region: us-central1
      node-env: staging
      allow-unauthenticated: false
      cloud-run-flags: '--ingress internal-and-cloud-load-balancing'
      static-bucket-name: 'vectreal-static-staging'
      static-cache-control: 'public, max-age=31536000, immutable'
      fail-on-health-check: false
    secrets:
      gcp-workload-identity-provider: ${{ secrets.GCP_WIF_PROVIDER_STAGING }}
      gcp-service-account: ${{ secrets.GCP_SA_EMAIL_STAGING }}
      gcp-project-id: ${{ secrets.GCP_PROJECT_ID_STAGING }}
      database-url: ${{ secrets.DATABASE_URL_STAGING }}
      supabase-url: ${{ secrets.SUPABASE_URL_STAGING }}
      supabase-key: ${{ secrets.SUPABASE_KEY_STAGING }}
      google-cloud-storage-private-bucket: ${{ secrets.GOOGLE_CLOUD_STORAGE_PRIVATE_BUCKET_STAGING }}
      application-url: ${{ secrets.APPLICATION_URL_STAGING }}
      csrf-secret: ${{ secrets.CSRF_SECRET_STAGING }}
      stripe-secret-key: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
      cloudflare-turnstile-site-key: ${{ secrets.CLOUDFLARE_TURNSTILE_SITE_KEY_STAGING }}
      cloudflare-turnstile-secret-key: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY_STAGING }}
      posthog-token: ${{ secrets.VITE_PUBLIC_POSTHOG_TOKEN }}
      posthog-host: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
      vectreal-api-key-prod: ${{ secrets.VITE_PUBLIC_VECTREAL_API_KEY_PROD }}
      demo-scene-url: ${{ secrets.VITE_PUBLIC_DEMO_SCENE_URL }}
      contact-data-encryption-key: ${{ secrets.CONTACT_DATA_ENCRYPTION_KEY_STAGING }}
      resend-api-key: ${{ secrets.RESEND_API_KEY_STAGING }}
      resend-webhook-secret: ${{ secrets.RESEND_WEBHOOK_SECRET_STAGING }}
      contact-inbox-email: ${{ secrets.CONTACT_INBOX_EMAIL }}
      from-email: ${{ secrets.FROM_EMAIL }}
      send-email-hook-secret: ${{ secrets.SEND_EMAIL_HOOK_SECRET_STAGING }}
